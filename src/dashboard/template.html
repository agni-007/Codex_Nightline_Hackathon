<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HyperLocal Echo</title>
  <style>
    :root { --ink:#12151B; --panel:#1A1F28; --panel-2:#20262F; --orange:#FF5A3C; --mint:#3DDC97; --amber:#F5B942; --line:#2C323D; --text:#F2F4F7; --muted:#9CA6B4; }
    * { box-sizing:border-box; } body { margin:0; background:var(--ink); color:var(--text); font:15px "IBM Plex Sans",Arial,sans-serif; }
    .shell { max-width:1280px; margin:26px auto; padding:0 22px 40px; } .terminal { background:var(--panel); border:1px solid var(--line); border-radius:13px; overflow:hidden; }
    .bar { height:43px; display:flex; align-items:center; border-bottom:1px solid var(--line); padding:0 16px; gap:8px; background:#171b23; } .dot { width:10px; height:10px; border-radius:50%; background:var(--orange); } .dot:nth-child(2){background:var(--amber)} .dot:nth-child(3){background:var(--mint)} .title { margin-left:8px; font:12px "IBM Plex Mono",monospace; color:var(--muted); }
    main { padding:30px; } .eyebrow,.mono { font:12px "IBM Plex Mono",monospace; letter-spacing:.06em; color:var(--muted); text-transform:uppercase; } h1,h2,h3 { font-family:"Space Grotesk",Arial,sans-serif; margin:0; } h1 { font-size:clamp(30px,5vw,54px); line-height:.98; max-width:780px; } h1 em { font-style:normal; color:var(--orange); } .status { display:inline-flex; gap:7px; align-items:center; margin-top:18px; color:var(--mint); font:12px "IBM Plex Mono",monospace; } .status i { width:8px;height:8px;border-radius:50%;background:var(--mint);box-shadow:0 0 14px var(--mint); }
    .masthead { display:flex; justify-content:space-between; gap:24px; align-items:flex-end; padding-bottom:30px; border-bottom:1px solid var(--line); } .equalizer { height:64px; display:flex; align-items:end; gap:5px; } .equalizer b { width:7px; background:var(--orange); border-radius:4px 4px 0 0; } .equalizer b:nth-child(1){height:24%}.equalizer b:nth-child(2){height:70%}.equalizer b:nth-child(3){height:45%}.equalizer b:nth-child(4){height:100%}.equalizer b:nth-child(5){height:55%}.equalizer b:nth-child(6){height:83%}.equalizer b:nth-child(7){height:34%}
    .pipeline { display:grid; grid-template-columns:repeat(5,1fr); gap:0; margin:25px 0 35px; border:1px solid var(--line); background:var(--panel-2); } .pipe { padding:13px 15px; border-right:1px solid var(--line); min-height:66px; } .pipe:last-child{border:0}.pipe strong{display:block;font-size:13px;margin-top:4px}.pipe small{color:var(--mint);font:10px "IBM Plex Mono",monospace}
    .section-heading { display:flex; justify-content:space-between; align-items:end; margin:28px 0 12px; } .cards { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:14px; } .card,.module { background:var(--panel-2); border:1px solid var(--line); border-radius:9px; padding:18px; } .card h3 { font-size:17px; } .count { color:var(--amber); font:11px "IBM Plex Mono",monospace; } .preview { white-space:pre-wrap; color:#CCD3DC; line-height:1.5; font-size:13px; max-height:170px; overflow:hidden; margin:14px 0 0; }
    .modules { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:10px; }.module { min-height:97px; display:flex; flex-direction:column; justify-content:space-between; } .switch { width:35px;height:19px;border-radius:20px;background:#49505c; padding:3px; align-self:flex-end; }.switch span {display:block;width:13px;height:13px;border-radius:50%;background:#c7cdd6}.module.on .switch{background:var(--mint)}.module.on .switch span{transform:translateX(16px);background:#102219}.module.on{border-color:#34715a}.module strong{font-size:13px}.module small{color:var(--muted)}
    textarea { width:100%; min-height:104px; resize:vertical; margin-top:14px; border:1px solid var(--line); border-radius:7px; background:var(--ink); color:var(--text); padding:12px; font:14px "IBM Plex Sans",Arial,sans-serif; } textarea:focus{outline:1px solid var(--orange);border-color:var(--orange)} .form-row{display:flex;justify-content:space-between;align-items:center;gap:15px;margin-top:10px} button{border:0;border-radius:6px;background:var(--orange);color:white;padding:10px 15px;font:600 13px "IBM Plex Sans",Arial,sans-serif;cursor:pointer}button:disabled{opacity:.55;cursor:wait}.notice { border-left:3px solid var(--amber); background:#28251e; padding:13px; color:#f4daa0; font-size:13px; margin-top:22px; } @media(max-width:800px){.cards{grid-template-columns:1fr}.modules{grid-template-columns:repeat(2,1fr)}.pipeline{grid-template-columns:1fr}.pipe{border-right:0;border-bottom:1px solid var(--line)}.masthead{align-items:start;flex-direction:column}.equalizer{display:none}.form-row{align-items:start;flex-direction:column}}
  </style>
</head>
<body><div class="shell"><div class="terminal"><div class="bar"><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="title">hyperlocal-echo / run dashboard</span></div><main id="app"></main></div></div>
<script>const RUN_DATA = __RUN_DATA__;
const esc=s=>String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const words=s=>(s.match(/\S+/g)||[]).length;
const app=document.getElementById('app');
const core=RUN_DATA.core.map(b=>`<article class="card"><div class="count">${words(b.content)} WORDS</div><h3>${esc(b.label)}</h3><div class="preview">${esc(b.content)}</div></article>`).join('');
const modules=RUN_DATA.modules.map(m=>`<article class="module ${m.active?'on':''}"><div class="switch"><span></span></div><strong>${esc(m.label)}</strong><small>${m.active?'GENERATED':'INACTIVE'}</small></article>`).join('');
app.innerHTML=`<header class="masthead"><div><div class="eyebrow">${esc(RUN_DATA.type)} · ${esc(RUN_DATA.location||'Local')}</div><h1>Signal received.<br><em>Content ready.</em></h1><div class="status"><i></i>RUN COMPLETE · ${esc(RUN_DATA.timestamp)}</div></div><div class="equalizer">${'<b></b>'.repeat(7)}</div></header><section class="card" style="margin:24px 0"><div class="eyebrow">NEW INPUT / PLAIN ENGLISH</div><h2 style="margin-top:6px">What should we promote?</h2><form id="generate-form"><textarea id="message" required minlength="20" placeholder="Example: This Saturday we're holding a sourdough workshop from 10am to noon. Twelve spots, ₹25, starter jar included."></textarea><div class="form-row"><span id="form-status" class="mono">Your saved profile and modules will be used.</span><button type="submit">Generate content</button></div></form></section><section class="pipeline"><div class="pipe"><small>01 / INPUT</small><strong>Asset received</strong></div><div class="pipe"><small>02 / PROMPT</small><strong>Signal shaped</strong></div><div class="pipe"><small>03 / OPENAI</small><strong>Matrix generated</strong></div><div class="pipe"><small>04 / SAFETY</small><strong>Facts scanned</strong></div><div class="pipe"><small>05 / OUTPUT</small><strong>Files written</strong></div></section><div class="section-heading"><h2>Core signal blocks</h2><span class="mono">${core?'03 / 03 READY':'AWAITING INPUT'}</span></div><section class="cards">${core||'<article class="card"><h3>Ready when you are</h3><div class="preview">Enter a plain-English update above to generate your marketing matrix.</div></article>'}</section><div class="section-heading"><h2>Expansion modules</h2><span class="mono">${RUN_DATA.activeCount} ACTIVE</span></div><section class="modules">${modules}</section>${RUN_DATA.fabricationFlagged?'<div class="notice">Possible untraced factual details were detected. Review flagged output before publishing.</div>':''}`;
const form=document.getElementById('generate-form'); const status=document.getElementById('form-status');
form.addEventListener('submit',async event=>{event.preventDefault();if(location.protocol==='file:'){status.textContent='Run `hyperlocal-echo serve` to generate from the dashboard.';return;}const button=form.querySelector('button');button.disabled=true;status.textContent='Generating content, this may take a moment…';try{const response=await fetch('/api/run',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:document.getElementById('message').value})});const data=await response.json();if(!response.ok)throw new Error(data.error||'Generation failed.');location.href=data.dashboardUrl;}catch(error){status.textContent=error.message||'Generation failed. Try again.';button.disabled=false;}});</script>
</body></html>
